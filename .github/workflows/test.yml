name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, reliable gate: the Swift Testing unit suite must pass.
  unit:
    name: Unit tests
    # MemoryEcho targets the iOS 26 SDK, which needs Xcode 26 (macOS 26).
    # Adjust this label if the runner image isn't available yet.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run unit tests
        run: make test-unit

  # UI tests are slower / flakier, so they run in their own job and don't
  # block the unit gate. Let them be the "nice to have" signal.
  ui:
    name: UI tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run UI tests
        run: make test-ui
