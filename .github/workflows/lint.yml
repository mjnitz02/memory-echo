name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint + SwiftFormat
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # SwiftLint ships on the macOS runner image; install both via Homebrew
      # so the job is self-contained and matches `make install-tools` locally.
      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint
