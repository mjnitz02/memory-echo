        <span style="font-size:22px; font-weight:680; letter-spacing:-.3px; text-shadow:0 1px 2px rgba(0,0,0,.14);">Pay the water bill</span>
      </div>

      <!-- 3. Buy groceries — Quick / tomorrow — teal -->

        <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.18));"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3.3 17.7a1.5 1.5 0 0 0 0 2.1l.9.9a1.5 1.5 0 0 0 2.1 0l6-6a4 4 0 0 0 5.4-5.4l-2.5 2.5-2.1-.6-.6-2.1 2.5-2.5Z"/></svg>
        <span style="font-size:22px; font-weight:680; letter-spacing:-.3px; text-shadow:0 1px 2px rgba(0,0,0,.14);">Fix the gate latch</span>

        <span style="font-size:22px; font-weight:680; letter-spacing:-.3px; text-shadow:0 1px 2px rgba(0,0,0,.14);">Clean out the garage</span>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      dismiss: (e) => {
        const el = e.currentTarget;
        if (el.dataset.echoGone) return;
        el.dataset.echoGone = '1';
        el.style.transition = 'transform .34s cubic-bezier(.36,.07,.2,1), opacity .34s ease';
        el.style.transform = 'translateX(112%)';
        el.style.opacity = '0';
        setTimeout(() => {
          el.style.transition = 'flex-grow .32s ease, flex-basis .32s ease, min-height .32s ease, opacity .2s';
          el.style.flexGrow = '0';
          el.style.flexBasis = '0';
          el.style.minHeight = '0';
          el.style.overflow = 'hidden';
        }, 280);
      },
    };
  }
}
</script>
