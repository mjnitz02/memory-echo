  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

=\"position:absolute; left:0; right:0; bottom:0; z-index:2; isolation:isolate; background:#1C1C1E; border-radius:30px 30px 0 0; box-shadow:0 -18px 50px rgba(0,0,0,.5); padding:12px 22px 26px; animation:echoSheetUp .42s cubic-bezier(.2,.7,.2,1);\">\n\n      <!-- grabber -->\n      <div style=\"width:38px; height:5px; border-radius:99px; background:rgba(235,235,245,.3); margin:0 auto 20px;\"><\u002Fdiv>\n\n      <!-- hero field -->\n      <div style=\"display:flex; align-items:center; gap:14px; height:68px; padding:0 14px 0 12px; border-radius:18px; background:{{ fieldBg }}; border:1.5px solid {{ fieldBorder }};\">\n        <div style=\"flex-shrink:0; width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; background:{{ accentGrad }}; box-shadow:0 2px 8px {{ accentShadow }};\">{{ iconEl }}<\u002Fdiv>\n        <div style=\"flex:1; display:flex; align-items:center; min-width:0;\">\n          <span style=\"font-size:24px; font-weight:680; letter-spacing:-.5px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ text }}<\u002Fspan>\n          <span style=\"display:inline-block; width:2.5px; height:27px; margin-left:2px; border-radius:2px; background:{{ accentSolid }}; animation:echoCaret 1.1s step-end infinite; flex-shrink:0;\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- EFFORT -->\n      <div style=\"font-size:12.5px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; color:rgba(235,235,245,.6); margin:22px 4px 10px;\">Effort<\u002Fdiv>\n      <div style=\"display:flex; gap:10px;\">\n        <div onclick=\"{{ setQuick }}\" style=\"flex:1; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:16px; font-weight:640; letter-spacing:-.2px; cursor:pointer; user-select:none; color:{{ quickText }}; background:{{ quickBg }}; border:1.5px solid {{ quickBorder }}; box-shadow:{{ quickShadow }};\">\n          <svg width= -weight:620; letter-spacing:-.2px; cursor:pointer; user-select:none; color:{{ laterText }}; background:{{ laterBg }};\">Later this week<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ADD -->\n      <div style=\"margin-top:24px; height:56px; border-radius:17px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; user-select:none; background:{{ accentGrad }}; box-shadow:0 8px 22px {{ accentShadow }}; color:#fff; font-size:18px; font-weight:700; letter-spacing:-.3px;\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5 V19 M5 12 H19\"><\u002Fpath><\u002Fsvg>\n        Add\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { text: 'Call the dentist', effort: 'quick', horizon: 'today' };\n\n  GRAD = {\n    quick: { today:['#1657C7','#2A78E6'], tomorrow:['#048BB0','#18B6D8'], later:['#0E9C84','#1CC0A0'] },\n    long:  { today:['#DB4B0B','#FB7414'], tomorrow:['#EC8A07','#FBA628'], later:['#D99A22','#F2C04A'] },\n  };\n\n  iconFor(text) {\n    const t = (text || '').toLowerCase();\n    const has = (...w) => w.some(x => t.includes(x));\n    const svg = (paths) => React.createElement('svg', {\n      width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'#fff',\n      strokeWidth:2.1, strokeLinecap:'round', strokeLinejoin:'round',\n      style:{ filter:'drop-shadow(0 1px 1.5px rgba(0,0,0,.2))' },\n    }, paths.map((d,i) => React.createElement('path', { key:i, d })));\n    const shapes = (els) => React.createElement('svg', {\n      width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'#fff',\n      strokeWidth:2.1, strokeLinecap:'round', strokeLinejoin:'round',\n      style:{ filter:'drop-shadow(0 1px 1.5px rgba(0,0,0,.2))' },\n    }, els);\n    if (has('call','pho vg(['M12 3 L13.9 9.2 L20 11 L13.9 12.8 L12 19 L10.1 12.8 L4 11 L10.1 9.2 Z']);\n  }\n\n  hexA(hex, a) {\n    const h = hex.replace('#','');\n    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);\n    return `rgba(${r},${g},${b},${a})`;\n  }\n\n  renderVals() {\n    const { text, effort, horizon } = this.state;\n    const [c1, c2] = this.GRAD[effort][horizon];\n    const accentGrad = `linear-gradient(105deg, ${c1}, ${c2})`;\n    const accentSolid = c2;\n\n    // cool/warm representative gradients for the effort chips (use current horizon)\n    const coolGrad = `linear-gradient(105deg, ${this.GRAD.quick[horizon][0]}, ${this.GRAD.quick[horizon][1]})`;\n    const warmGrad = `linear-gradient(105deg, ${this.GRAD.long[horizon][0]}, ${this.GRAD.long[horizon][1]})`;\n\n    const offText = 'rgba(235,235,245,.85)';\n    const offBg = 'rgba(118,118,128,.24)';\n    const offBorder = 'transparent';\n    const noShadow = 'none';\n\n    const hChip = (key) => horizon === key\n      ? { text:'#fff', bg: accentGrad }\n      : { text:'rgba(235,235,245,.85)', bg:'rgba(118,118,128,.24)' };\n    const today = hChip('today'), tomorrow = hChip('tomorrow'), later = hChip('later');\n\n    return {\n      text,\n      iconEl: this.iconFor(text),\n      accentGrad,\n      accentSolid,\n      accentShadow: this.hexA(c2, .42),\n      fieldBg: this.hexA(c2, .2),\n      fieldBorder: this.hexA(c2, .42),\n\n      setQuick: () => this.setState({ effort:'quick' }),\n      setLong: () => this.setState({ effort:'long' }),\n      setToday: () => this.setState({ horizon:'today' }),\n      setTomorrow: () => this.setState({ horizon:'tomorrow' }),\n      setLater: () => this.setState({ horizon:'later' }),\n\n      quickText: effort==='quick' ? '#fff' : offText,\n      quickBg:   effort==='quick' ? coolGrad : offBg,\n      quickBorder: effort==='quick' ? 'transparent' : offBorder,\n      quickShadow: effort==='quick' ? `0 6px 16px ${this.hexA(this.GRAD.quick[horizon][1], .34)}` : noShadow,\n\n      longText: effort==='long' ? '#fff' : offText,\n      longBg:   effort==='long' ? warmGrad : offBg,\n      longBorder: effort==='long' ? 'transparent' : offBorder,\n      longShadow: effort==='long' ? `0 6px 16px ${this.hexA(this.GRAD.long[horizon][1], .34)}` : noShadow,\n\n      todayText: today.text, todayBg: today.bg,\n      tomorrowText: tomorrow.text, tomorrowBg: tomorrow.bg,\n      laterText: later.text, laterBg: later.bg,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
